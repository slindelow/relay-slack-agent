name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: relay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://relay:relay@localhost:5432/relay_test
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --locked

      - name: Create relay DB user
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d relay_test \
            -c "CREATE ROLE relay LOGIN PASSWORD 'relay' NOSUPERUSER NOCREATEDB NOCREATEROLE;" \
            -c "GRANT CONNECT ON DATABASE relay_test TO relay;" \
            -c "GRANT ALL ON SCHEMA public TO relay;"

      - name: Run tests
        run: uv run pytest tests -v --tb=short

      - name: Run critical coverage
        run: uv run pytest tests --cov=relay.crypto --cov=relay.slack.verify --cov=classifier.evaluate --cov-report=term-missing
