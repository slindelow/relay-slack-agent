display_information:
  name: RELAY Beta
  description: Human-approved customer-success assistant for Slack Connect channels.
  background_color: "#17202a"
features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: false
    messages_tab_read_only_enabled: true
  bot_user:
    display_name: RELAY
    always_online: false
  slash_commands:
    - command: /relay
      url: https://relay-beta.example.com/slack/events
      description: Configure RELAY and manage customer questions.
      usage_hint: help
      should_escape: false
oauth_config:
  redirect_urls:
    - https://relay-beta.example.com/slack/oauth_redirect
    - https://relay-beta.example.com/slack/search/oauth_redirect
  scopes:
    bot:
      - app_mentions:read
      - channels:read
      - chat:write
      - commands
      - groups:history
      - groups:read
      - im:write
      - users:read
    user:
      - search:read.public
      - search:read.files
      - search:read.users
settings:
  event_subscriptions:
    request_url: https://relay-beta.example.com/slack/events
    bot_events:
      - app_home_opened
      - app_uninstalled
      - message.groups
  interactivity:
    is_enabled: true
    request_url: https://relay-beta.example.com/slack/events
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
